<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 0 0 H 56 M 0 0 V 56" stroke="rgba(245,244,240,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#0a0a0a"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <text x="100" y="140" fill="#f0ede6" font-family="'JetBrains Mono', monospace" font-size="56" font-weight="700" letter-spacing="-1">seven iterations.</text>
  <text x="100" y="184" fill="rgba(240,237,230,0.55)" font-family="'JetBrains Mono', monospace" font-size="22">still arguing with myself about whether any of it is right.</text>

  <!-- fanned window cards, v1 (back, dim) through v7 (front, lime) -->
  <g transform="translate(800,760)">

    <!-- v1 -->
    <g transform="rotate(-24)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="rgba(245,244,240,0.16)"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="rgba(245,244,240,0.16)"/>
        <circle cx="16" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <circle cx="30" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <circle cx="44" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <text x="130" y="100" fill="rgba(240,237,230,0.45)" font-family="monospace" font-size="20" text-anchor="middle">v1</text>
      </g>
    </g>

    <!-- v2 -->
    <g transform="rotate(-16)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="rgba(245,244,240,0.16)"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="rgba(245,244,240,0.16)"/>
        <circle cx="16" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <circle cx="30" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <circle cx="44" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <text x="130" y="100" fill="rgba(240,237,230,0.48)" font-family="monospace" font-size="20" text-anchor="middle">v2</text>
      </g>
    </g>

    <!-- v3 -->
    <g transform="rotate(-8)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="rgba(245,244,240,0.16)"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="rgba(245,244,240,0.16)"/>
        <circle cx="16" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <circle cx="30" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <circle cx="44" cy="13" r="4" fill="rgba(245,244,240,0.18)"/>
        <text x="130" y="100" fill="rgba(240,237,230,0.5)" font-family="monospace" font-size="20" text-anchor="middle">v3</text>
      </g>
    </g>

    <!-- v4 -->
    <g transform="rotate(0)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="rgba(245,244,240,0.18)"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="rgba(245,244,240,0.18)"/>
        <circle cx="16" cy="13" r="4" fill="rgba(245,244,240,0.2)"/>
        <circle cx="30" cy="13" r="4" fill="rgba(245,244,240,0.2)"/>
        <circle cx="44" cy="13" r="4" fill="rgba(245,244,240,0.2)"/>
        <text x="130" y="100" fill="rgba(240,237,230,0.55)" font-family="monospace" font-size="20" text-anchor="middle">v4</text>
      </g>
    </g>

    <!-- v5 -->
    <g transform="rotate(8)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="rgba(245,244,240,0.2)"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="rgba(245,244,240,0.2)"/>
        <circle cx="16" cy="13" r="4" fill="rgba(245,244,240,0.22)"/>
        <circle cx="30" cy="13" r="4" fill="rgba(245,244,240,0.22)"/>
        <circle cx="44" cy="13" r="4" fill="rgba(245,244,240,0.22)"/>
        <text x="130" y="100" fill="rgba(240,237,230,0.6)" font-family="monospace" font-size="20" text-anchor="middle">v5</text>
      </g>
    </g>

    <!-- v6 -->
    <g transform="rotate(16)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="rgba(245,244,240,0.24)"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="rgba(245,244,240,0.24)"/>
        <circle cx="16" cy="13" r="4" fill="rgba(245,244,240,0.26)"/>
        <circle cx="30" cy="13" r="4" fill="rgba(245,244,240,0.26)"/>
        <circle cx="44" cy="13" r="4" fill="rgba(245,244,240,0.26)"/>
        <text x="130" y="100" fill="rgba(240,237,230,0.7)" font-family="monospace" font-size="20" text-anchor="middle">v6</text>
      </g>
    </g>

    <!-- v7, front, lime, current -->
    <g transform="rotate(24)">
      <g transform="translate(-130,-300)">
        <rect width="260" height="160" rx="6" fill="#111111" stroke="#9eff57" stroke-width="2"/>
        <rect width="260" height="26" rx="6" fill="#1a1a1a" stroke="#9eff57" stroke-width="2"/>
        <circle cx="16" cy="13" r="4" fill="#ff5f57"/>
        <circle cx="30" cy="13" r="4" fill="#febc2e"/>
        <circle cx="44" cy="13" r="4" fill="#28c840"/>
        <text x="130" y="95" fill="#9eff57" font-family="monospace" font-weight="700" font-size="22" text-anchor="middle">v7</text>
        <text x="130" y="120" fill="rgba(158,255,87,0.7)" font-family="monospace" font-size="13" text-anchor="middle">you are here</text>
      </g>
    </g>

  </g>

  <text x="100" y="850" fill="rgba(240,237,230,0.4)" font-family="monospace" font-size="16">portfolio-meta.md · reflection · 2026</text>
</svg>
