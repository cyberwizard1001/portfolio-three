<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 0 H 40 M 0 0 V 40" stroke="rgba(245,244,240,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="280" fill="#0a0a0a"/>
  <rect width="960" height="280" fill="url(#grid2)"/>

  <text x="40" y="46" fill="#f0ede6" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">an hour with a client, broken down</text>
  <text x="40" y="72" fill="rgba(240,237,230,0.55)" font-family="'JetBrains Mono', monospace" font-size="14">where the 15&#8211;20 minutes of admin goes</text>

  <!-- horizontal timeline bar: total track width 880px = 60min, x=40 -->
  <g transform="translate(40,120)">
    <!-- prep: 5min admin -->
    <rect x="0" y="0" width="73" height="56" fill="rgba(245,244,240,0.45)"/>
    <text x="37" y="36" fill="#0a0a0a" font-family="monospace" font-size="12" text-anchor="middle">prep</text>
    <text x="37" y="-12" fill="rgba(240,237,230,0.55)" font-family="monospace" font-size="13" text-anchor="middle">5 min</text>

    <!-- session: 40min practice -->
    <rect x="73" y="0" width="587" height="56" fill="#9eff57"/>
    <text x="366" y="36" fill="#0a0a0a" font-family="monospace" font-weight="700" font-size="15" text-anchor="middle">client session</text>
    <text x="366" y="-12" fill="#9eff57" font-family="monospace" font-size="13" text-anchor="middle">40 min</text>

    <!-- notes: 8min admin -->
    <rect x="660" y="0" width="117" height="56" fill="rgba(245,244,240,0.45)"/>
    <text x="718" y="36" fill="#0a0a0a" font-family="monospace" font-size="13" text-anchor="middle">notes</text>
    <text x="718" y="-12" fill="rgba(240,237,230,0.55)" font-family="monospace" font-size="13" text-anchor="middle">8 min</text>

    <!-- billing/follow-up: 7min admin -->
    <rect x="777" y="0" width="103" height="56" fill="rgba(245,244,240,0.45)"/>
    <text x="828" y="24" fill="#0a0a0a" font-family="monospace" font-size="10.5" text-anchor="middle">billing /</text>
    <text x="828" y="40" fill="#0a0a0a" font-family="monospace" font-size="10.5" text-anchor="middle">follow-up</text>
    <text x="828" y="-12" fill="rgba(240,237,230,0.55)" font-family="monospace" font-size="13" text-anchor="middle">7 min</text>
  </g>

  <!-- legend -->
  <circle cx="40" cy="222" r="6" fill="rgba(245,244,240,0.45)"/>
  <text x="54" y="227" fill="rgba(240,237,230,0.55)" font-family="monospace" font-size="14">admin &#8212; 20 of 60 minutes</text>
  <circle cx="330" cy="222" r="6" fill="#9eff57"/>
  <text x="344" y="227" fill="#9eff57" font-family="monospace" font-size="14">client practice &#8212; 40 of 60 minutes</text>

  <text x="40" y="260" fill="rgba(240,237,230,0.4)" font-family="monospace" font-size="13">interview finding, counselling-companions.md</text>
</svg>
