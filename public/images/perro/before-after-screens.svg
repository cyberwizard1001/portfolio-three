<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="268" viewBox="0 0 1200 268">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 0 H 40 M 0 0 V 40" stroke="rgba(245,244,240,0.07)" stroke-width="1"/>
    </pattern>
    <linearGradient id="afterLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6fe03f"/>
      <stop offset="100%" stop-color="#9eff57"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="268" fill="#0a0a0a"/>
  <rect width="1200" height="268" fill="url(#grid)"/>

  <!-- ── BEFORE row ── y=12 to y=130 -->
  <rect x="60" y="12" width="1080" height="118" rx="10" fill="rgba(245,244,240,0.02)" stroke="rgba(245,244,240,0.10)"/>
  <text x="82" y="36" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="0.06em" fill="rgba(240,237,230,0.38)">BEFORE</text>
  <rect x="964" y="18" width="160" height="24" rx="12" fill="rgba(245,244,240,0.04)" stroke="rgba(245,244,240,0.14)"/>
  <text x="1044" y="34" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle" fill="rgba(240,237,230,0.36)">5 screens · 16 qs</text>

  <!-- before track -->
  <line x1="100" y1="78" x2="1100" y2="78" stroke="rgba(245,244,240,0.20)" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- before nodes (5) r=11 y=78 -->
  <g fill="#0d0d0d" stroke="rgba(245,244,240,0.28)" stroke-width="1.5">
    <circle cx="100"  cy="78" r="11"/>
    <circle cx="350"  cy="78" r="11"/>
    <circle cx="600"  cy="78" r="11"/>
    <circle cx="850"  cy="78" r="11"/>
    <circle cx="1100" cy="78" r="11"/>
  </g>

  <!-- before labels y=94 / y=108 -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(240,237,230,0.38)" text-anchor="middle">
    <text x="100"  y="96">sign-up</text>
    <text x="350"  y="96">verify</text>
    <text x="600"  y="93">pet info +</text>
    <text x="600"  y="107">photo upload</text>
    <text x="850"  y="93">plans +</text>
    <text x="850"  y="107">health fields</text>
    <text x="1100" y="93">user profile</text>
    <text x="1100" y="107">fitness / location</text>
  </g>

  <!-- ── AFTER row ── y=144 to y=256 -->
  <rect x="60" y="144" width="1080" height="112" rx="10" fill="rgba(158,255,87,0.03)" stroke="rgba(158,255,87,0.20)"/>
  <text x="82" y="166" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="0.06em" fill="#9eff57">AFTER</text>
  <rect x="964" y="150" width="160" height="24" rx="12" fill="rgba(158,255,87,0.08)" stroke="rgba(158,255,87,0.28)"/>
  <text x="1044" y="166" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle" fill="#9eff57">4 screens · 11 qs</text>

  <!-- badges: y=174 h=18 bottom=192, nodes at y=214 r=13 top=201, gap=9px -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" letter-spacing="0.07em">
    <rect x="52"  y="174" width="96"  height="18" rx="9" fill="rgba(158,255,87,0.10)" stroke="rgba(158,255,87,0.32)"/>
    <text x="100" y="187" text-anchor="middle" fill="#9eff57">NEW</text>

    <rect x="368" y="174" width="130" height="18" rx="9" fill="rgba(158,255,87,0.10)" stroke="rgba(158,255,87,0.32)"/>
    <text x="433" y="187" text-anchor="middle" fill="#9eff57">CHANGED</text>

    <rect x="719" y="174" width="96"  height="18" rx="9" fill="rgba(158,255,87,0.10)" stroke="rgba(158,255,87,0.32)"/>
    <text x="767" y="187" text-anchor="middle" fill="#9eff57">NEW</text>

    <rect x="1035" y="174" width="130" height="18" rx="9" fill="rgba(158,255,87,0.10)" stroke="rgba(158,255,87,0.32)"/>
    <text x="1100" y="187" text-anchor="middle" fill="#9eff57">CHANGED</text>
  </g>

  <!-- after track y=214 -->
  <line x1="100" y1="214" x2="1100" y2="214" stroke="url(#afterLine)" stroke-width="3.5"/>

  <!-- after nodes (4) r=13 y=214 -->
  <g fill="#0d0d0d" stroke="#9eff57" stroke-width="2.5">
    <circle cx="100"  cy="214" r="13"/>
    <circle cx="433"  cy="214" r="13"/>
    <circle cx="767"  cy="214" r="13"/>
    <circle cx="1100" cy="214" r="13"/>
  </g>

  <!-- after labels y=233 / y=247 -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(240,237,230,0.72)" text-anchor="middle">
    <text x="100"  y="234">feature carousel</text>
    <text x="433"  y="231">sign-up +</text>
    <text x="433"  y="245">avatar (no photo)</text>
    <text x="767"  y="231">permissions</text>
    <text x="767"  y="245">explainer</text>
    <text x="1100" y="231">subscription</text>
    <text x="1100" y="245">(value-first)</text>
  </g>
</svg>
